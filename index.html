<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ゴルフオリンピック Ver.2.0</title>
<style>
:root{
  --bg:#f6f7f4;--card:#fff;--text:#172018;--muted:#657064;--line:#dfe5dd;--accent:#176b3a;--accent2:#f2b84b;--danger:#c0392b;--blue:#2f6fab;--soft:#edf5ef;--shadow:0 8px 24px rgba(0,0,0,.08);--radius:18px;
}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5}button,input,select{font:inherit}button{cursor:pointer;border:0;border-radius:14px;padding:12px 14px;font-weight:700;background:var(--accent);color:#fff;box-shadow:0 2px 0 rgba(0,0,0,.08)}button.secondary{background:#fff;color:var(--accent);border:1px solid var(--line);box-shadow:none}button.warn{background:var(--danger)}button.gold{background:#b8860b}button.small{padding:8px 10px;border-radius:10px;font-size:13px}button:disabled{opacity:.45}.wrap{max-width:980px;margin:0 auto;padding:14px 14px 86px}.hero{background:linear-gradient(135deg,#164d2c,#22894a);color:#fff;padding:22px;border-radius:0 0 28px 28px;box-shadow:var(--shadow);position:sticky;top:0;z-index:5}.hero h1{margin:0;font-size:24px}.hero p{margin:6px 0 0;color:#e5f4e8;font-size:14px}.tabs{display:flex;gap:8px;overflow:auto;padding:12px 0}.tab{white-space:nowrap;background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:none}.tab.active{background:var(--accent);color:#fff}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin:12px 0;box-shadow:var(--shadow)}.card h2{margin:0 0 10px;font-size:19px}.card h3{margin:12px 0 8px;font-size:16px}.grid{display:grid;gap:10px}.grid2{grid-template-columns:repeat(2,1fr)}.grid4{grid-template-columns:repeat(4,1fr)}label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}input,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:16px}.player-row{display:grid;grid-template-columns:1fr 90px;gap:10px;align-items:end}.scoreboard{display:grid;gap:8px}.rank{display:grid;grid-template-columns:36px 1fr auto auto;gap:8px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:14px;background:#fff}.rank .name{font-weight:800}.pill{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:3px 8px;background:var(--soft);font-size:12px;color:var(--accent);font-weight:700}.pill.red{background:#fdecea;color:var(--danger)}.pill.gold{background:#fff5d8;color:#8a5e00}.hole-head{display:flex;gap:10px;align-items:center;justify-content:space-between}.player-card{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff}.player-card h3{display:flex;align-items:center;justify-content:space-between;margin:0 0 10px}.toggles{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.toggle{background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:none;padding:10px}.toggle.on{background:var(--accent);color:#fff}.olympic{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.olympic button{background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:none;padding:9px 6px;font-size:13px}.olympic button.on{background:var(--accent2);color:#1c1500;border-color:#d69a28}.penalty-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.penalty-btn{background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:none;min-height:48px}.penalty-btn.on{background:var(--danger);color:#fff}.cards{display:flex;flex-wrap:wrap;gap:6px}.pcard{padding:6px 9px;background:#fff;border:1px solid var(--line);border-radius:10px;font-size:12px}.pcard.hot{background:#fdecea;border-color:#f0b5ac;color:#96281b;font-weight:800}.history{display:grid;gap:8px}.history-item{border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px}.table{width:100%;border-collapse:separate;border-spacing:0 7px}.table th{font-size:12px;color:var(--muted);text-align:left}.table td{background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:9px}.table td:first-child{border-left:1px solid var(--line);border-radius:12px 0 0 12px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 12px 12px 0}.bottom-nav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);border-top:1px solid var(--line);display:flex;gap:6px;padding:8px;z-index:9}.bottom-nav button{flex:1;padding:10px 4px;border-radius:12px;font-size:12px;background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:none}.bottom-nav button.active{background:var(--accent);color:#fff}.note{color:var(--muted);font-size:13px}.rule-list{padding-left:18px;margin:8px 0}.rule-list li{margin:5px 0}.toast{position:fixed;left:14px;right:14px;bottom:70px;background:#172018;color:#fff;border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);z-index:20;display:none}.toast.show{display:block}.danger-zone{border-color:#f3c1bb;background:#fff8f7}@media(min-width:760px){.players-input{grid-template-columns:repeat(2,1fr)}.round-grid{grid-template-columns:1.1fr .9fr}.bottom-nav{max-width:980px;left:50%;transform:translateX(-50%);border-radius:18px 18px 0 0}.hero{border-radius:0 0 28px 28px}.penalty-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<header class="hero"><h1>⛳ ゴルフオリンピック Ver.2.0</h1><p>通常スコアとオリンピック得点を別管理。スマホ1台で4人分を入力できます。</p></header>
<main class="wrap">
  <div class="tabs" id="topTabs"></div>
  <section id="setup" class="view"></section>
  <section id="play" class="view" hidden></section>
  <section id="ranking" class="view" hidden></section>
  <section id="cards" class="view" hidden></section>
  <section id="rules" class="view" hidden></section>
  <section id="history" class="view" hidden></section>
</main>
<nav class="bottom-nav" id="bottomNav"></nav>
<div class="toast" id="toast"></div>
<script>
const PENALTIES = ['OB','池ポチャ','3パット','バンカー','チョロ','1ペナ','木に当たる','カラー'];
const OLYMPIC = {none:0,gold:4,silver:3,bronze:2,iron:1};
const OLYMPIC_LABEL = {none:'なし',gold:'金',silver:'銀',bronze:'銅',iron:'鉄'};
const DEFAULT_NAMES = ['プレイヤー1','プレイヤー2','プレイヤー3','プレイヤー4'];
const STORAGE_KEY = 'golf_olympic_v2_state';
let state = loadState() || newState();
let currentView = 'setup';
let draft = makeDraft();
function newState(){return {version:'2.0',started:false,course:'',date:new Date().toISOString().slice(0,10),players:DEFAULT_NAMES.map((n,i)=>({id:i,name:n,handicap:0,olympic:0,stroke:0,putts:0,birdies:0,penaltyPoint:0,kakuhen:false,kakuhenReason:'',olympicCounts:{gold:0,silver:0,bronze:0,iron:0},penaltyCards:[]})),hole:1,par:4,nearPinCarry:0,history:[],cardLog:[]};}
function makeDraft(){return {par:state.par||4, rows:state.players.map(p=>({score:'',putts:'',olympic:'none',birdie:false,diamond:false,sunaichi:false,saoSuccess:false,saoFail:false,nearPin:false,rescue:false,penalties:[]}))};}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY));}catch(e){return null}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show';setTimeout(()=>t.className='toast',2600)}
function navItems(){return [{id:'setup',label:'設定'},{id:'play',label:'入力'},{id:'ranking',label:'順位'},{id:'cards',label:'カード'},{id:'rules',label:'ルール'},{id:'history',label:'履歴'}]}
function switchView(id){currentView=id;document.querySelectorAll('.view').forEach(v=>v.hidden=v.id!==id);render();window.scrollTo({top:0,behavior:'smooth'});}
function renderNav(){const html=navItems().map(x=>`<button class="${currentView===x.id?'active':''}" onclick="switchView('${x.id}')">${x.label}</button>`).join('');document.getElementById('topTabs').innerHTML=html;document.getElementById('bottomNav').innerHTML=html;}
function render(){renderNav();renderSetup();renderPlay();renderRanking();renderCards();renderRules();renderHistory();}
function renderSetup(){document.getElementById('setup').innerHTML=`<div class="card"><h2>ゲーム設定</h2><p class="note">名前・ハンデ・ゴルフ場名を入力して開始します。開始後も名前変更できます。</p><div class="grid"><div><label>ゴルフ場名</label><input id="course" value="${esc(state.course)}" placeholder="例：○○カントリークラブ"></div><div><label>日付</label><input id="date" type="date" value="${state.date}"></div></div><h3>プレイヤー</h3><div class="grid players-input">${state.players.map((p,i)=>`<div class="player-row"><div><label>プレイヤー${i+1}</label><input id="pname${i}" value="${esc(p.name)}"></div><div><label>HDCP</label><input id="phd${i}" type="number" value="${p.handicap||0}"></div></div>`).join('')}</div><div class="grid grid2" style="margin-top:14px"><button onclick="startGame()">ゲーム開始・設定保存</button><button class="secondary" onclick="switchView('rules')">ルール確認</button></div></div><div class="card danger-zone"><h2>データ操作</h2><p class="note">スマホ内に自動保存されます。最初からやり直す場合だけ押してください。</p><button class="warn" onclick="resetAll()">全データをリセット</button></div>`}
function startGame(){state.course=document.getElementById('course').value.trim();state.date=document.getElementById('date').value;state.players.forEach((p,i)=>{p.name=document.getElementById('pname'+i).value.trim()||DEFAULT_NAMES[i];p.handicap=Number(document.getElementById('phd'+i).value||0)});state.started=true;if(state.players.every(p=>p.penaltyCards.length===0)) dealCards('スタート時ランダム配布');save();showToast('設定を保存しました');switchView('play')}
function resetAll(){if(confirm('すべての入力データを削除します。よろしいですか？')){state=newState();draft=makeDraft();save();render();showToast('リセットしました')}}
function renderPlay(){document.getElementById('play').innerHTML=`<div class="round-grid grid"><div>${scoreMini()}<div class="card"><div class="hole-head"><h2>ホール入力</h2><span class="pill">${state.hole}H / Par ${draft.par}</span></div><div class="grid grid2"><button class="secondary" onclick="changeHole(-1)">← 前ホール</button><button class="secondary" onclick="changeHole(1)">次ホール →</button></div><div style="margin-top:10px"><label>Par</label><select onchange="draft.par=Number(this.value)"><option ${draft.par==3?'selected':''}>3</option><option ${draft.par==4?'selected':''}>4</option><option ${draft.par==5?'selected':''}>5</option></select></div>${state.players.map((p,i)=>playerInput(p,i)).join('')}<button style="width:100%;margin-top:12px" onclick="saveHole()">このホールを登録</button></div></div><div>${cardSummary()}${nearPinBox()}</div></div>`}
function scoreMini(){return `<div class="card"><h2>現在順位</h2><div class="scoreboard">${ranked().map((p,idx)=>`<div class="rank"><div>${idx+1}</div><div class="name">${esc(p.name)} ${p.kakuhen?'<span class="pill red">確変</span>':''}</div><div><span class="pill gold">${p.olympic}点</span></div><div><span class="pill">${p.stroke||0}打</span></div></div>`).join('')}</div></div>`}
function playerInput(p,i){const r=draft.rows[i];return `<div class="player-card"><h3>${esc(p.name)} <span class="pill">通常 ${p.stroke||0}打 / 五輪 ${p.olympic}点</span></h3><div class="grid grid2"><div><label>通常スコア</label><input type="number" inputmode="numeric" value="${r.score}" onchange="draft.rows[${i}].score=this.value" placeholder="例：5"></div><div><label>パット数</label><input type="number" inputmode="numeric" value="${r.putts}" onchange="draft.rows[${i}].putts=this.value" placeholder="例：2"></div></div><h3>金・銀・銅・鉄</h3><div class="olympic">${Object.keys(OLYMPIC).map(k=>`<button class="${r.olympic===k?'on':''}" onclick="setOlympic(${i},'${k}')">${OLYMPIC_LABEL[k]}</button>`).join('')}</div><h3>加点・特別ルール</h3><div class="toggles">${toggle(i,'birdie','バーディ +2')}${toggle(i,'diamond','ダイヤモンド +5')}${toggle(i,'sunaichi','砂1 +1')}${toggle(i,'saoSuccess','竿成功 +3')}${toggle(i,'saoFail','竿失敗 -3')}${toggle(i,'nearPin','ニアピン')}${toggle(i,'rescue','レスキュー')}${p.kakuhen?'<span class="pill red">確変中</span>':'<span class="pill">通常</span>'}</div><h3>ペナルティ行為</h3><div class="penalty-grid">${PENALTIES.map(card=>`<button class="penalty-btn ${r.penalties.includes(card)?'on':''}" onclick="togglePenalty(${i},'${card}')">${card}</button>`).join('')}</div></div>`}
function toggle(i,key,label){return `<button class="toggle ${draft.rows[i][key]?'on':''}" onclick="draft.rows[${i}].${key}=!draft.rows[${i}].${key};renderPlay()">${label}</button>`}
function setOlympic(i,k){draft.rows[i].olympic=k;renderPlay()}
function togglePenalty(i,card){const arr=draft.rows[i].penalties;const idx=arr.indexOf(card);if(idx>=0)arr.splice(idx,1);else arr.push(card);renderPlay()}
function changeHole(d){state.hole=Math.min(18,Math.max(1,state.hole+d));save();renderPlay()}
function saveHole(){if(!state.started){showToast('先にゲーム設定を保存してください');switchView('setup');return}let entry={hole:state.hole,par:draft.par,players:[],createdAt:new Date().toISOString()};let messages=[];let putts=draft.rows.map(r=>Number(r.putts||0));state.players.forEach((p,i)=>{const r=draft.rows[i];let pts=0;let details=[];const sc=Number(r.score||0);const pt=Number(r.putts||0);if(sc>0)p.stroke+=sc;if(pt>0)p.putts+=pt;pts+=OLYMPIC[r.olympic]||0;if(r.olympic!=='none'){p.olympicCounts[r.olympic]++;details.push(OLYMPIC_LABEL[r.olympic]+'+'+(OLYMPIC[r.olympic]||0));}
if(r.birdie){pts+=2;p.birdies++;details.push('バーディ+2')}if(r.diamond){pts+=5;details.push('ダイヤ+5')}if(r.sunaichi){pts+=1;details.push('砂1+1')}if(r.saoSuccess){pts+=3;details.push('竿+3')}if(r.saoFail){pts-=3;details.push('竿失敗-3')}if(r.nearPin){details.push('ニアピン権利');state.nearPinCarry=0}if(r.rescue){pts+=0;details.push('レスキュー')}
// near pin points only on par3 and if checked
if(draft.par===3 && r.nearPin){pts+=3+state.nearPinCarry;details.push('ニアピン+'+(3+state.nearPinCarry));}
// kakuhen activation
const hasIkki=['gold','silver','bronze','iron'].every(k=>p.olympicCounts[k]>0);const hasKan=['gold','silver','bronze','iron'].some(k=>p.olympicCounts[k]>=4);if(!p.kakuhen && (hasIkki||hasKan)){p.kakuhen=true;p.kakuhenReason=hasIkki?'一気通貫':'カン';messages.push(`${p.name} が確変突入（${p.kakuhenReason}）`)}
if(p.kakuhen && pt>0){let bonus=0;putts.forEach((other,j)=>{if(j!==i && other>pt) bonus += other-pt});if(bonus>0){pts+=bonus;details.push('確変+'+bonus)}}
// kakuhen end if any penalty action
if(p.kakuhen && r.penalties.length>0){p.kakuhen=false;details.push('確変終了');messages.push(`${p.name} の確変終了`)}
// move penalty cards
r.penalties.forEach(card=>movePenaltyCard(card,i));
p.olympic+=pts;entry.players.push({id:p.id,name:p.name,score:sc,putts:pt,points:pts,details,penalties:[...r.penalties]});});
// par3 carry if nobody near pin
if(draft.par===3 && !draft.rows.some(r=>r.nearPin)){state.nearPinCarry+=3;messages.push('ニアピン該当なし：次回Par3へ3点持ち越し')}
checkAllCards();state.history.push(entry);state.hole=Math.min(18,state.hole+1);draft=makeDraft();save();render();showToast(messages.length?messages.join(' / '):'ホールを登録しました')}
function movePenaltyCard(card,playerIdx){state.players.forEach(p=>{p.penaltyCards=p.penaltyCards.filter(c=>c!==card)});state.players[playerIdx].penaltyCards.push(card);state.cardLog.push({time:new Date().toISOString(),card,to:state.players[playerIdx].name,reason:'行為発生'});}
function checkAllCards(){const target=state.players.find(p=>p.penaltyCards.length===8);if(target){target.olympic-=16;target.penaltyPoint-=16;state.cardLog.push({time:new Date().toISOString(),card:'全8枚',to:target.name,reason:'全部揃い -16点 → 再配布'});dealCards(`${target.name} が8枚揃い -16点。再配布`);showToast(`${target.name} がペナルティカード全8枚で -16点。再配布しました`);}}
function dealCards(reason){let deck=[...PENALTIES].sort(()=>Math.random()-0.5);state.players.forEach(p=>p.penaltyCards=[]);deck.forEach((c,i)=>state.players[i%4].penaltyCards.push(c));state.cardLog.push({time:new Date().toISOString(),card:'配布',to:'全員',reason});save();}
function cardSummary(){return `<div class="card"><h2>ペナルティカード</h2><p class="note">各行為が出たら、そのカードが該当者へ移動。8枚全部揃うと-16点、その時点で再配布。</p>${state.players.map(p=>`<h3>${esc(p.name)} <span class="pill ${p.penaltyCards.length>=6?'red':''}">${p.penaltyCards.length}枚</span></h3><div class="cards">${p.penaltyCards.map(c=>`<span class="pcard ${p.penaltyCards.length>=6?'hot':''}">${c}</span>`).join('')}</div>`).join('')}<button class="secondary" style="margin-top:12px" onclick="dealCards('手動再配布');render();showToast('カードを再配布しました')">カードを手動再配布</button></div>`}
function nearPinBox(){return `<div class="card"><h2>ニアピン</h2><p>現在の持ち越し：<span class="pill gold">${state.nearPinCarry}点</span></p><p class="note">Par3でニアピン該当者がいない場合、3点ずつ次のPar3へ持ち越します。</p></div>`}
function renderRanking(){document.getElementById('ranking').innerHTML=`${scoreMini()}<div class="card"><h2>詳細集計</h2><table class="table"><thead><tr><th>名前</th><th>五輪点</th><th>通常</th><th>パット</th><th>HDCP</th><th>Net</th></tr></thead><tbody>${ranked().map(p=>`<tr><td>${esc(p.name)}</td><td>${p.olympic}</td><td>${p.stroke||0}</td><td>${p.putts||0}</td><td>${p.handicap||0}</td><td>${(p.stroke||0)-(p.handicap||0)}</td></tr>`).join('')}</tbody></table></div>`}
function renderCards(){document.getElementById('cards').innerHTML=`${cardSummary()}<div class="card"><h2>カード移動ログ</h2><div class="history">${state.cardLog.slice().reverse().slice(0,30).map(l=>`<div class="history-item"><strong>${esc(l.card)}</strong> → ${esc(l.to)}<br><span class="note">${esc(l.reason)}</span></div>`).join('')||'<p class="note">まだログはありません。</p>'}</div></div>`}
function renderRules(){document.getElementById('rules').innerHTML=`<div class="card"><h2>ルール文書 Ver.2.0</h2><h3>1. 基本</h3><ul class="rule-list"><li>4人プレーを前提とし、スマホ1台で入力する。</li><li>通常のゴルフスコアと、オリンピック得点は別々に集計する。</li><li>入力内容はスマホのブラウザに自動保存される。</li></ul><h3>2. オリンピック</h3><ul class="rule-list"><li>金：4点、銀：3点、銅：2点、鉄：1点。</li><li>後半3ホールなどで「大人の時間」を採用する場合は、運用で2倍計算する想定。必要なら次版で自動化。</li></ul><h3>3. 特別加点</h3><ul class="rule-list"><li>バーディ：+2点。</li><li>ダイヤモンド：+5点。</li><li>砂1：+1点。</li><li>竿成功：+3点、竿失敗：-3点。</li></ul><h3>4. 確変</h3><ul class="rule-list"><li>金・銀・銅・鉄をすべて1回以上取ると一気通貫で確変。</li><li>同じ種類を4回取るとカンで確変。</li><li>確変中は、自分よりパット数が多い他プレイヤーとの差分を加点する。</li><li>ペナルティカード対象行為が発生した時点で確変終了。</li></ul><h3>5. ニアピン・レスキュー</h3><ul class="rule-list"><li>Par3のニアピンは+3点。</li><li>誰もニアピンを取らなければ次のPar3へ持ち越し。</li><li>レスキューは、Par3で1オンせずパーを取った場合の火消しルールとして管理。</li></ul><h3>6. ペナルティカード</h3><ul class="rule-list"><li>カードは8種類：${PENALTIES.join('、')}。</li><li>スタート時に8枚をランダムに2枚ずつ配布する。</li><li>該当行為が出たら、そのカードは該当者へ移動する。</li><li>誰か1人に8枚全部が揃った時点で-16点。</li><li>-16点発生後、その時点でカードを再配布する。</li></ul></div>`}
function renderHistory(){document.getElementById('history').innerHTML=`<div class="card"><h2>ホール履歴</h2><div class="history">${state.history.slice().reverse().map(h=>`<div class="history-item"><strong>${h.hole}H / Par ${h.par}</strong>${h.players.map(p=>`<div>${esc(p.name)}：通常 ${p.score||'-'} / パット ${p.putts||'-'} / 五輪 ${p.points}点 <span class="note">${p.details.join('、')}${p.penalties.length?' / 罰:'+p.penalties.join('、'):''}</span></div>`).join('')}</div>`).join('')||'<p class="note">まだ履歴はありません。</p>'}</div></div>`}
function ranked(){return [...state.players].sort((a,b)=>b.olympic-a.olympic || ((a.stroke||999)-(b.stroke||999)))}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
render();
</script>
</body>
</html>
